<script>
function cleanupHTML(rawHTML) {
  let t = rawHTML;

  t = removeSpaces(t);
  t = leninHeader(t);
  t = t.replaceAll(/<!--[^>]*-->/gm, '');
  t = removeMouseover(t);
  t = linkCleanup(t);
  t = selfcloseCleanup(t);
  t = removeSpaces(t);
  t = t.replaceAll(/<a id='[^']*'>/gm, '');
  t = headCleanup(t);
  t = paragraphCleanup(t);
  t = endnoteCleanup(t);
  t = classRemoval(t);
  t = characterCleanup(t);
  t = infoCleanup(t);
  t = endDocCleanup(t);
  t = htmlCleanup(t);
  t = infoTableCleanup(t);
  t = t.replaceAll(/<span>(.+)(\s+)(.+)<\/span>/gm, '$1 $3');

  return t;
}

function removeSpaces(t) {
  t = t.replaceAll(`      `, ``);
  t = t.replaceAll(`    `, ``);
  t = t.replaceAll(`  `, ``);
  t = t.replaceAll(`  `, ``);
  t = t.replaceAll(` &#160;`, ``);
  t = t.replaceAll(`\t`, ``);
  t = t.replaceAll(`&nbsp;`, ``);
  t = t.replaceAll(`\n\n \n`, ``);
  t = t.replaceAll(`\n\n  \n`, ``);
  t = t.replaceAll(`\n\n   \n`, ``);
  return t;
}

function leninHeader(t) {
  t = t.replaceAll(`<h2>\n<a title`, `<h2><a title`);
  t = t.replaceAll(`</a>\n\n<a title`, `</a> <a title`);
  t = t.replaceAll(/<h2><a [^>]*\">V\. I\.(.+)Lenin<\/a><\/h2>/gm, `<h2>Vladimir Ilyich Lenin</h2>`);
  return t;
}

function removeMouseover(t) {
  t = t.replaceAll(/<a onmouseover="[^"]*" onmouseout="[^"]*">(\w+)<\/a>/gm, `$1`);
  t = t.replaceAll(/<a onmouseover="[^"]*" onmouseout="[^"]*">(\w+\W+)<\/a>/gm, `$1`);
  t = t.replaceAll(/<a onmouseover="[^"]*" onmouseout="[^"]*">(\s+)<\/a>/gm, ` `);
  t = t.replaceAll(/<a onmouseover="[^"]*" onmouseout="[^"]*"><\/a>/gm, ``);
  return t;
}

function selfcloseCleanup(t) {
  t = t.replaceAll(`  />`, `>`);
  t = t.replaceAll(` />`, `>`);
  t = t.replaceAll(`/>`, `>`);
  return t;
}

function linkCleanup(t) {
  t = t.replaceAll(` <a name="notes"></a>`, ``);
  t = t.replaceAll(` <a name="footnotes"></a>`, ``);
  t = t.replaceAll(` <a name="endnotes"></a>`, ``);
  t = t.replaceAll(`a class="ednote"`, `a`);
  t = t.replaceAll(`a class="anote"`, `a`);
  t = t.replaceAll(`a class="endnote"`, `a`);
  t = t.replaceAll(`<a name=`, `<a id=`);
  t = t.replaceAll(`<a\n name=`, `<a id=`);
  t = t.replaceAll(`<a \n name=`, `<a id=`);
  t = t.replaceAll(`<a\n id=`, `<a id=`);
  t = t.replaceAll(`"\n href=`, `" href=`);
  t = t.replaceAll(`<sup><a`, `<sup class="endnote"><a`);
  t = t.replaceAll(`class="ednote"`, `class="endnote"`);
  t = t.replaceAll(/" name="[^"]*"/gm, `"`);
  return t;
}

function headCleanup(t) {
  t = t.replaceAll(/<!DOCTYPE [^>]*>/gm, `<!DOCTYPE html>`);
  t = t.replaceAll(`<html xmlns="http://www.w3.org/1999/xhtml">`, `<html lang="en">`);
  t = t.replaceAll(`<html lang="en"><head>`, `<html lang="en">\n<head>`);
  t = t.replaceAll(`<!DOCTYPE html>\n\n\n<html lang="en">`, `<!DOCTYPE html>\n\n<html lang="en">`);
  t = t.replaceAll(`<meta name="generator" content="http://www.marxists.org/archive/lenin/howto/tx2html.el">\n`, ``);
  t = t.replaceAll(/<meta name="generated" content="[^"]*">/gm, ``);
  t = t.replaceAll(`">\n\n\n\n\n<title>`, `">\n\n<title>`);
  t = t.replaceAll(`<meta`, `  <meta`);
  t = t.replaceAll(`<link`, `  <link`);
  t = t.replaceAll(`<title>`, `  <title>`);
  return t;
}

function paragraphCleanup(t) {
  t = t.replaceAll(`<p>\n\n\n`, `<p>`);
  t = t.replaceAll(`<p>\n\n`, `<p>`);
  t = t.replaceAll(`<p>\n`, `<p>`);
  t = t.replaceAll(`\n\n\n</p>`, `</p>`);
  t = t.replaceAll(`\n\n</p>`, `</p>`);
  t = t.replaceAll(`\n</p>`, `</p>`);
  t = t.replaceAll(`<p class="fst">\n\n`, `<p class="fst">`);
  t = t.replaceAll(`<p class="fst">\n`, `<p class="fst">`);
  t = t.replaceAll(`<p class="endnote">\n`, `<p class="endnote">`);
  t = t.replaceAll(`</p><p>`, `</p>\n\n<p>`);
  t = t.replaceAll(`</p>\n\n \n\n<p>`, `</p>\n\n<p>`);
  t = t.replaceAll(`</p>\n\n\n\n<hr>`, `</p>\n\n<hr>`);
  t = t.replaceAll(`<p class="quote">\n`, `<p class="quote">`);
  t = t.replaceAll(`<p class="sig">\n`, `<p class="sig">`);
  t = t.replaceAll(`<p class="placedate">\n`, `<p class="placedate">`);
  return t;
}

function endnoteCleanup(t) {
  t = t.replaceAll(`\n&#8212;<em>Lenin</em>`, `—<em>Lenin</em>`);
  t = t.replaceAll(`<h3>Notes</h3>\n\n\n\n\n\n<p class="endnote">`, `<h3>Notes</h3>\n\n<p class="endnote">`);
  t = t.replaceAll(`<h3>Notes</h3>\n\n\n\n\n\n\n\n\n\n<p class="endnote">`, `<h3>Notes</h3>\n\n<p class="endnote">`);
  t = t.replaceAll(`</p>\n\n\n\n\n\n<p class="endnote">`, `</p>\n\n<p class="endnote">`);
  t = t.replaceAll(`</p>\n\n\n\n<p class="endnote">`, `</p>\n\n<p class="endnote">`);
  t = t.replaceAll(`</p>\n\n\n\n\n\n\n\n<p class="endnote">`, `</p>\n\n<p class="endnote">`);
  return t;
}

function classRemoval(t) {
  t = t.replaceAll(` class="supratitle"`, ``);
  t = t.replaceAll(` class="subtitle"`, ``);
  t = t.replaceAll(` class="chapnumb"`, ``);
  t = t.replaceAll(` class="chaptitl"`, ``);
  t = t.replaceAll(` class="inline"`, ``);
  t = t.replaceAll(` class="title"`, ``);
  t = t.replaceAll(` title="Endnotes HR"`, ``);
  return t;
}

function characterCleanup(t) {
  t = t.replaceAll(`\\"a`, `ä`);
  t = t.replaceAll(`\\"A`, `Ä`);
  t = t.replaceAll(`\\"i`, `ï`);
  t = t.replaceAll(`\\"I`, `Ï`);
  t = t.replaceAll(`\\"o`, `ö`);
  t = t.replaceAll(`\\"O`, `Ö`);
  t = t.replaceAll(`\\"u`, `ü`);
  t = t.replaceAll(`\\"U`, `Ü`);
  t = t.replaceAll(`\\thinspace`, ``);
  return t;
}

function infoCleanup(t) {
  t = t.replaceAll(/<a [^>]*\.txt">(\w+)<\/a>/gm, `$1`);
  t = t.replaceAll(/<a [^>]*\.txt">(\W+)<\/a>/gm, `$1`);
  return t;
}

function endDocCleanup(t) {
  t = t.replaceAll(`</p>\n\n\n\n\n</body>`, `</p>\n\n</body>`);
  t = t.replaceAll(`</html>\n`, `</html>`);
  return t;
}

function htmlCleanup(t) {
  t = t.replaceAll(`<center>`, `<div style="text-align:center">`);
  t = t.replaceAll(`</center>`, `</div>`);
  t = t.replaceAll(`align="center"`, `style="text-align: center;"`);
  return t;
}

function infoTableCleanup(t) {
  t = t.replaceAll(`class="info" style="text-align: center;" width="80%"`, `class="info" style="width: 80%;"`);
  t = t.replaceAll(`<td style="text-align: center;" width="33%">`, `<td style="text-align: center;  width: 33%;">`);
  t = t.replaceAll(`<tr><td style="text-align: center;  width: 33%;">`, `  <tr>\n<td style="text-align: center;  width: 33%;">`);
  t = t.replaceAll(`<td style="text-align: center;  width: 33%;">`, `    <td style="text-align: center;  width: 33%;">`);
  return t;
}
</script>

<script type="module">
  import * as prettier from 'https://unpkg.com/prettier@3/standalone.mjs';
  import * as prettierHtml from 'https://unpkg.com/prettier@3/plugins/html.mjs';

  const CORS_PROXIES = [
    url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  async function fetchViaProxy(url) {
    for (const proxy of CORS_PROXIES) {
      try {
        const res = await fetch(proxy(url));
        if (res.ok) return res;
      } catch (_) {}
    }
    throw new Error('All proxies failed. Check your connection or try again later.');
  }

  const editor = ace.edit('editor');
  editor.setTheme('ace/theme/monokai');
  editor.session.setMode('ace/mode/html');
  editor.setFontSize(12);
  editor.setShowPrintMargin(false);
  editor.session.setUseWrapMode(true);
  editor.setOptions({ scrollPastEnd: 0.5 });

  const urlInput          = document.getElementById('url-input');
  const fetchBtn          = document.getElementById('fetch-btn');
  const downloadBtn           = document.getElementById('download-btn');
  const validateBtn       = document.getElementById('validate-btn');
  const previewFrame      = document.getElementById('preview-frame');
  const validationPanel   = document.getElementById('validation-panel');
  const validationSummary = document.getElementById('validation-summary');
  const validationMsgs    = document.getElementById('validation-messages');

  let currentUrl = '';

  function collapseparagraphs(html) {
    return html.replace(/<p([^>]*)>([\s\S]*?)<\/p>/gm, (_, attrs, inner) =>
      `<p${attrs}>${inner.replace(/\s+/g, ' ').trim()}</p>`
    );
  }

  function injectBase(htmlStr, pageUrl) {
    const base = pageUrl.substring(0, pageUrl.lastIndexOf('/') + 1);
    const tag = `<base href="${base}">`;
    if (/<base\b/i.test(htmlStr)) return htmlStr;
    return htmlStr.replace(/(<head[^>]*>)/i, `$1\n  ${tag}`);
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  editor.session.on('change', () => {
    const content = editor.getValue();
    previewFrame.srcdoc = currentUrl ? injectBase(content, currentUrl) : content;
    const hasContent = content.length > 0;
    downloadBtn.disabled = !hasContent;
    validateBtn.disabled = !hasContent;
    if (!hasContent) {
      validationPanel.classList.remove('open');
      editor.session.clearAnnotations();
    }
  });

  fetchBtn.addEventListener('click', async () => {
    const url = urlInput.value.trim();
    if (!url) return;

    fetchBtn.disabled = true;
    fetchBtn.textContent = 'Fetching…';
    downloadBtn.disabled = true;

    try {
      const res = await fetchViaProxy(url);
      const rawHTML = await res.text();
      let cleaned = cleanupHTML(rawHTML);
      currentUrl = url;

      fetchBtn.textContent = 'Formatting…';
      try {
        cleaned = await prettier.format(cleaned, {
          parser: 'html',
          plugins: [prettierHtml],
          printWidth: 9999,
          tabWidth: 2,
          htmlWhitespaceSensitivity: 'css',
        });
      } catch (e) {
        console.warn('Prettier failed, using unformatted output:', e);
      }

      cleaned = collapseparagraphs(cleaned);

      editor.setValue(cleaned, -1);
      previewFrame.srcdoc = injectBase(cleaned, url);
      downloadBtn.disabled = false;

    } catch (err) {
      alert(`Network error: ${err.message}`);
    } finally {
      fetchBtn.disabled = false;
      fetchBtn.textContent = 'Fetch & Clean';
    }
  });

  validateBtn.addEventListener('click', async () => {
    const html = editor.getValue();
    if (!html) return;

    validateBtn.disabled = true;
    validateBtn.textContent = 'Validating…';

    try {
      const res = await fetch('https://validator.w3.org/nu/?out=json', {
        method: 'POST',
        headers: { 'Content-Type': 'text/html; charset=utf-8' },
        body: html,
      });

      const data = await res.json();
      const messages = (data.messages || []).filter(m => m.type !== 'non-document-error');

      const errors   = messages.filter(m => m.type === 'error');
      const warnings = messages.filter(m => m.subType === 'warning');

      editor.session.setAnnotations(
        messages
          .filter(m => m.lastLine)
          .map(m => ({
            row:    m.lastLine - 1,
            column: (m.lastColumn || 1) - 1,
            text:   m.message,
            type:   m.type === 'error' ? 'error' : 'warning',
          }))
      );

      const summary = errors.length === 0 && warnings.length === 0
        ? `<span style="color:#a6e22e">✓ Valid — no errors or warnings</span>`
        : `<span style="display:flex;align-items:center;gap:16px">
            <span>
              <span style="color:#f92672;font-weight:700">${errors.length} error${errors.length !== 1 ? 's' : ''}</span>
              <span style="color:#75715e;font-weight:400;font-size:10px;margin-left:4px">must fix</span>
            </span>
            <span>
              <span style="color:#e6db74;font-weight:700">${warnings.length} warning${warnings.length !== 1 ? 's' : ''}</span>
              <span style="color:#75715e;font-weight:400;font-size:10px;margin-left:4px">review only</span>
            </span>
           </span>`;

      validationSummary.innerHTML = `${summary}<button id="val-close">✕</button>`;
      document.getElementById('val-close').addEventListener('click', () => {
        validationPanel.classList.remove('open');
        editor.session.clearAnnotations();
      });

      const rank = m => m.type === 'error' ? 0 : m.subType === 'warning' ? 1 : 2;
      messages.sort((a, b) => rank(a) - rank(b));

      validationMsgs.innerHTML = messages.map(m => {
        const cls  = m.type === 'error' ? 'val-error' : m.subType === 'warning' ? 'val-warning' : 'val-info';
        const type = m.type === 'error' ? 'error' : m.subType === 'warning' ? 'warn' : 'info';
        const line = m.lastLine ? `line ${m.lastLine}` : '—';
        return `<div class="val-msg ${cls}" data-line="${m.lastLine || 0}">
          <span class="val-line">${line}</span>
          <span class="val-type">${type}</span>
          <span class="val-text">${escapeHtml(m.message)}</span>
        </div>`;
      }).join('');

      validationMsgs.querySelectorAll('.val-msg[data-line]').forEach(el => {
        const line = parseInt(el.dataset.line);
        if (line) el.addEventListener('click', () => { editor.gotoLine(line, 0, true); editor.focus(); });
      });

      validationPanel.classList.add('open');

    } catch (err) {
      alert(`Validation failed: ${err.message}`);
    } finally {
      validateBtn.disabled = false;
      validateBtn.textContent = 'Validate';
    }
  });

  downloadBtn.addEventListener('click', () => {
    const blob = new Blob([editor.getValue()], { type: 'text/html' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: currentUrl ? currentUrl.split('/').pop() || 'cleaned.html' : 'cleaned.html',
    });
    a.click();
    URL.revokeObjectURL(a.href);
  });

  urlInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchBtn.click();
  });

  const backdrop = document.getElementById('modal-backdrop');
  document.getElementById('instructions-btn').addEventListener('click', () => {
    backdrop.classList.add('open');
  });
  document.getElementById('modal-close').addEventListener('click', () => {
    backdrop.classList.remove('open');
  });
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) backdrop.classList.remove('open');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') backdrop.classList.remove('open');
  });
</script>
</body>
</html>
