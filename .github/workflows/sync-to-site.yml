name: Sync to espaces-marx.github.io

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: espaces-marx/espaces-marx.github.io
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}
          path: site

      - name: Copy file
        run: |
          mkdir -p site/tools
          cp lia-restoration.html site/tools/lia-restoration.html

      - name: Commit and push
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/lia-restoration.html
          git diff --staged --quiet || git commit -m "sync: update tools/lia-restoration.html from lia-restoration repo"
          git push
